# SentryGuard - Simple deployment (Postgres + Kafka + API + Webapp)
# No Tesla Fleet Telemetry server - for testing with simulated data
#
# Usage:
#   1. cp .env.docker .env && fill in values
#   2. docker compose -f docker-compose.simple.yml --env-file .env up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: sentryguard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-sentryguard}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-sentryguard}
      POSTGRES_DB: ${DATABASE_NAME:-sentryguard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-sentryguard}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sentryguard

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: sentryguard-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'ruok' | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentryguard

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: sentryguard-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_DELETE_TOPIC_ENABLE: 'true'
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sentryguard

  message-producer:
    image: confluentinc/cp-kafka:7.4.0
    container_name: sentryguard-producer
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://message-producer:29093
    command: >
      bash -c "
        echo 'Simulating Tesla Fleet telemetry messages...'
        while true; do
          VIN_PREFIXES=('5YJ3E1EA' '5YJ3E1EB' '5YJ3E1EC' '5YJ3E1FA' '5YJ3E1FB')
          VIN_PREFIX=$${VIN_PREFIXES[$$(shuf -i 0-4 -n 1)]}
          VIN_SUFFIX=$$(shuf -i 100000-999999 -n 1)
          VIN=$${VIN_PREFIX}$${VIN_SUFFIX}
          IS_SENTRY_ALERT=$$(shuf -i 0-9 -n 1)
          if [ \"$${IS_SENTRY_ALERT}\" -lt 3 ]; then
            SENTRY_STATE='SentryModeStateAware'
          else
            STATES=('SentryModeStateArmed' 'SentryModeStateOff' 'SentryModeStateIdle')
            SENTRY_STATE=$${STATES[$$(shuf -i 0-2 -n 1)]}
          fi
          MESSAGE='{\"vin\":\"'$${VIN}'\",\"createdAt\":\"'$$(date -u +%Y-%m-%dT%H:%M:%SZ)'\",\"isResend\":false,\"data\":[{\"key\":\"SentryMode\",\"value\":{\"sentryModeStateValue\":\"'$${SENTRY_STATE}'\"}}]}'
          echo \"$$MESSAGE\" | kafka-console-producer --bootstrap-server kafka:29092 --topic FleetTelemetry_V --property \"key.separator=:\" --property \"parse.key=true\"
          sleep $$(shuf -i 20-40 -n 1)
        done
      "
    networks:
      - sentryguard

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: sentryguard-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      WEBAPP_URL: ${WEBAPP_URL:-http://localhost:3000}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER:-sentryguard}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-sentryguard}
      DATABASE_NAME: ${DATABASE_NAME:-sentryguard}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      DATABASE_RUN_MIGRATIONS: "true"
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_OAUTH_STATE_SECRET: ${JWT_OAUTH_STATE_SECRET:?JWT_OAUTH_STATE_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1d}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      TELEGRAM_MODE: ${TELEGRAM_MODE:-polling}
      TELEGRAM_WEBHOOK_BASE: ${TELEGRAM_WEBHOOK_BASE:-}
      TELEGRAM_WEBHOOK_SECRET_PATH: ${TELEGRAM_WEBHOOK_SECRET_PATH:-}
      TELEGRAM_WEBHOOK_SECRET_TOKEN: ${TELEGRAM_WEBHOOK_SECRET_TOKEN:-}
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-FleetTelemetry_V}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    ports:
      - "${API_PORT:-3001}:3001"
    networks:
      - sentryguard

  webapp:
    build:
      context: .
      dockerfile: apps/webapp/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    container_name: sentryguard-webapp
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "${WEBAPP_PORT:-3000}:3000"
    networks:
      - sentryguard

volumes:
  postgres_data:

networks:
  sentryguard:
    driver: bridge